<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Stock Badge – Generate Icons</title>
  <style>
    body { background: #111; color: #fff; font-family: system-ui; padding: 32px; }
    canvas { border-radius: 8px; margin: 16px; image-rendering: pixelated; }
    .row { display: flex; align-items: flex-end; gap: 24px; flex-wrap: wrap; }
    .col { text-align: center; }
    label { display: block; font-size: 12px; color: #aaa; margin-top: 8px; }
    button { margin-top: 24px; background: #00d97e; color: #000; border: none;
             border-radius: 8px; padding: 12px 28px; font-size: 15px;
             font-weight: 700; cursor: pointer; }
    button:hover { background: #00f090; }
  </style>
</head>
<body>
  <h2>Stock Badge — Icon Generator</h2>
  <p style="color:#aaa">Preview below. Click <strong>Download All Icons</strong> to save the 3 PNG files into this folder.</p>
  <div class="row" id="previews"></div>
  <button onclick="downloadAll()">⬇ Download All Icons</button>

  <script>
    const SIZES = [16, 48, 128];

    function drawIcon(size) {
      const canvas = document.createElement('canvas');
      canvas.width = canvas.height = size;
      const ctx = canvas.getContext('2d');
      const S = size / 128;

      // ── Background ──────────────────────────────────────────
      ctx.fillStyle = '#0f0f1a';
      ctx.beginPath();
      ctx.roundRect(0, 0, size, size, Math.max(2, 22 * S));
      ctx.fill();

      if (size >= 48) {
        // Subtle green radial glow at top
        const grd = ctx.createRadialGradient(64*S, 18*S, 0, 64*S, 18*S, 55*S);
        grd.addColorStop(0, 'rgba(0,217,126,0.18)');
        grd.addColorStop(1, 'rgba(0,217,126,0)');
        ctx.fillStyle = grd;
        ctx.beginPath();
        ctx.roundRect(0, 0, size, size, Math.max(2, 22 * S));
        ctx.fill();
      }

      // ── Candlestick bars ────────────────────────────────────
      const bars = [
        { x: 18, y: 78, w: 20, h: 32, color: '#ff4757' },
        { x: 48, y: 54, w: 20, h: 56, color: '#00d97e' },
        { x: 78, y: 26, w: 20, h: 84, color: '#00d97e' },
      ];

      bars.forEach(b => {
        ctx.fillStyle = b.color;
        ctx.beginPath();
        ctx.roundRect(b.x*S, b.y*S, b.w*S, b.h*S, Math.max(1, 3*S));
        ctx.fill();
      });

      if (size >= 48) {
        // ── Wicks ──────────────────────────────────────────────
        const wicks = [
          { cx: 28, y1: 70, y2: 78,  y3: 110, y4: 116, color: '#ff4757' },
          { cx: 58, y1: 46, y2: 54,  y3: 110, y4: 116, color: '#00d97e' },
          { cx: 88, y1: 18, y2: 26,  y3: 110, y4: 116, color: '#00d97e' },
        ];
        wicks.forEach(w => {
          ctx.strokeStyle = w.color;
          ctx.lineWidth = Math.max(1, 2 * S);
          ctx.lineCap = 'round';
          [[w.y1, w.y2], [w.y3, w.y4]].forEach(([a, b]) => {
            ctx.beginPath();
            ctx.moveTo(w.cx * S, a * S);
            ctx.lineTo(w.cx * S, b * S);
            ctx.stroke();
          });
        });

        // ── Trend line ─────────────────────────────────────────
        ctx.strokeStyle = 'rgba(0,217,126,0.7)';
        ctx.lineWidth = Math.max(1.5, 3.5 * S);
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.beginPath();
        ctx.moveTo(18 * S, 76 * S);
        ctx.lineTo(58 * S, 52 * S);
        ctx.lineTo(98 * S, 24 * S);
        ctx.stroke();
      }

      // ── $ badge (bottom-right) ─────────────────────────────
      if (size >= 48) {
        const cx = 102 * S, cy = 102 * S, r = 20 * S;
        ctx.fillStyle = '#00d97e';
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#0a0a14';
        ctx.font = `800 ${Math.round(20 * S)}px -apple-system, system-ui, Arial, sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('$', cx, cy + 0.5 * S);
      } else {
        // 16px: just a green dot hint
        ctx.fillStyle = '#00d97e';
        ctx.beginPath();
        ctx.arc(size - 4, size - 4, 3, 0, Math.PI * 2);
        ctx.fill();
      }

      return canvas;
    }

    // ── Previews ────────────────────────────────────────────────
    const container = document.getElementById('previews');
    SIZES.forEach(size => {
      const col = document.createElement('div');
      col.className = 'col';
      const canvas = drawIcon(size);
      canvas.style.width  = Math.max(size, 64) + 'px';
      canvas.style.height = Math.max(size, 64) + 'px';
      col.appendChild(canvas);
      const lbl = document.createElement('label');
      lbl.textContent = `icon${size}.png`;
      col.appendChild(lbl);
      container.appendChild(col);
    });

    // ── Download ─────────────────────────────────────────────────
    function downloadAll() {
      SIZES.forEach((size, i) => {
        setTimeout(() => {
          const canvas = drawIcon(size);
          canvas.toBlob(blob => {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `icon${size}.png`;
            document.body.appendChild(a);
            a.click();
            a.remove();
          }, 'image/png');
        }, i * 200);
      });
    }
  </script>
</body>
</html>
