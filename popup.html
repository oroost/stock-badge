<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Badge</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <h1>📈 Stock Badge</h1>

  <section class="tf-section">
    <h2>Timeframe</h2>
    <div id="tf-buttons">
      <button class="tf-btn" data-tf="1D">1D</button>
      <button class="tf-btn" data-tf="1W">1W</button>
      <button class="tf-btn" data-tf="1M">1M</button>
      <button class="tf-btn" data-tf="3M">3M</button>
      <button class="tf-btn" data-tf="1Y">1Y</button>
    </div>
  </section>

  <section class="toggle-section">
    <div class="toggle-row">
      <div>
        <div class="toggle-label">Earnings Countdown</div>
        <div class="toggle-desc">Show next earnings date &amp; beat/miss record</div>
      </div>
      <label class="switch">
        <input type="checkbox" id="toggle-earnings" />
        <span class="slider"></span>
      </label>
    </div>
  </section>

  <section class="add-section">
    <h2>Add a company</h2>
    <div class="row">
      <input id="inp-domain" type="text" placeholder="Domain (e.g. tesla.com)" />
      <input id="inp-ticker" type="text" placeholder="Ticker (e.g. TSLA)" maxlength="10" />
    </div>
    <button id="btn-add">+ Add</button>
    <p id="msg" class="msg"></p>
  </section>

  <section class="list-section">
    <h2>Custom companies</h2>
    <ul id="custom-list"></ul>
    <p id="empty-hint" class="hint">No custom companies yet.</p>
  </section>

  <script src="popup.js"></script>
</body>
</html>
